<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cockpit · BlastOff</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/cockpit.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">BlastOff</a>
    <div class="nav-links">
      <a class="nav-link" href="/">Launch</a>
      <a class="nav-link is-active" href="/cockpit">Cockpit</a>
      <a class="nav-link" href="/connect">Connect</a>
    </div>
  </nav>

  <div class="container">

    <div id="cockpit-empty" class="cockpit-empty" hidden>
      <h1>Cockpit</h1>
      <p>Paste a product URL to load its launch readiness across every directory.</p>
      <form class="extract-form" id="load-form">
        <input type="url" class="extract-input" id="url-input" placeholder="https://yourproduct.com" required>
        <button type="submit" class="btn btn-primary btn-large">Load</button>
      </form>
      <p class="extract-hint">Tip: extract a product first at <a href="/">Launch</a>.</p>
    </div>

    <div id="cockpit-main" hidden>
      <header class="cockpit-header">
        <div class="cockpit-product">
          <h1 id="product-name">—</h1>
          <p class="cockpit-tagline" id="product-tagline">—</p>
          <a class="cockpit-url" id="product-url" href="#" target="_blank">—</a>
        </div>
        <div class="cockpit-counts">
          <div class="cockpit-count">
            <div class="cockpit-count-num" id="count-ready">0/5</div>
            <div class="cockpit-count-label">ready</div>
          </div>
          <div class="cockpit-count">
            <div class="cockpit-count-num" id="count-done">0/5</div>
            <div class="cockpit-count-label">submitted</div>
          </div>
        </div>
      </header>

      <main class="cockpit-grid" id="grid"></main>

      <details class="cockpit-more">
        <summary class="cockpit-more-summary">
          <span class="cockpit-more-chev">▸</span>
          <span><span id="more-count">0</span> more directories</span>
          <span class="cockpit-more-hint">paid, sales-led, or higher-judgment launches</span>
        </summary>
        <main class="cockpit-grid" id="more-grid"></main>
      </details>
    </div>

    <div id="cockpit-error" class="cockpit-error" hidden>
      <h2>Something went wrong</h2>
      <p id="error-msg">—</p>
      <a href="/" class="btn btn-primary">Back to Launch</a>
    </div>

    <div id="toast" class="toast" hidden></div>

  </div>

  <script src="/cockpit.js"></script>
</body>
</html>
